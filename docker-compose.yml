services:
  astros:
    hostname: astros
    platform: linux/arm64/v8
    build:
      context: .
      dockerfile: ./Dockerfile
      tags:
        - ghcr.io/battlesloth/astros-server:1.0.0-dev.0
        - ghcr.io/battlesloth/astros-server:latest
    ports:
      - 8080:80
      - 3000:3000
      - 5000:5000
    volumes:
      - /home/jeff/build:/root/.config/astrosserver
    networks:
      - astronet

networks:
  astronet:
    external: true
