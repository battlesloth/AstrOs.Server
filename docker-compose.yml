services:
  astros:
    hostname: astros
    platform: linux/arm64/v8
    build:
      context: .
      dockerfile: ./Dockerfile
      tags:
        - docker.io/dirtknap/astros-server:1.3.9
        - docker.io/dirtknap/astros-server:latest
    ports:
      - 8080:80
      - 3000:3000
      - 5000:5000
    volumes:
      - /home/jeff/build:/root/.config/astrosserver
    networks:
      - astronet

networks:
  astronet:
    external: true
