name: Pull Request CI

on:
  pull_request:
    branches: [main]

jobs:
  api:
    name: API – Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astros_api/package-lock.json

      - name: Install dependencies
        working-directory: astros_api
        run: npm ci

      - name: Prettier check
        working-directory: astros_api
        run: npm run prettier:check

      - name: Lint
        working-directory: astros_api
        run: npx eslint . --ext .js,.jsx,.ts,.tsx

      - name: Build
        working-directory: astros_api
        run: npx tsc

      - name: Unit tests
        working-directory: astros_api
        run: npm run test -- --run

  vue:
    name: Vue – Lint, Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astros_vue/package-lock.json

      - name: Install dependencies
        working-directory: astros_vue
        run: npm ci

      - name: Prettier check
        working-directory: astros_vue
        run: npx prettier --check --experimental-cli "src/**"

      - name: Lint
        working-directory: astros_vue
        run: npx eslint .

      - name: Build
        working-directory: astros_vue
        run: npm run build

      #- name: Unit tests
      #  working-directory: astros_vue
      #  run: npm run test:unit -- --run

  playwright:
    name: Vue – Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [api, vue]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            astros_api/package-lock.json
            astros_vue/package-lock.json

      - name: Install API dependencies
        working-directory: astros_api
        run: npm ci

      - name: Build API
        working-directory: astros_api
        run: npx tsc && cp .env.example ./dist/.env

      - name: Install Vue dependencies
        working-directory: astros_vue
        run: npm ci

      - name: Build Vue app
        working-directory: astros_vue
        run: npm run build

      - name: Install Playwright browsers
        working-directory: astros_vue
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: astros_vue
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: astros_vue/playwright-report/
          retention-days: 14
