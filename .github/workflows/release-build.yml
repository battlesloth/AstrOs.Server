name: Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'release'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Bump Version, Build & Push
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Bump release version
        id: version
        run: |
          CURRENT=$(jq -r .version astros_api/package.json)
          if [[ "$CURRENT" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)-.+$ ]]; then
            # Has prerelease suffix: strip it to produce the clean release version
            NEW_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          elif [[ "$CURRENT" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            # Already a clean version: increment patch
            NEW_VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"
          else
            echo "::error::Unexpected version format: $CURRENT"
            exit 1
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW_VERSION"

      - name: Update versions in project files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          GHCR_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/astros-server"
          cd astros_api && npm version "$VERSION" --no-git-tag-version && cd ..
          cd astros_vue && npm version "$VERSION" --no-git-tag-version && cd ..
          sed -i -E "s|ghcr\.io/[^:]+:([0-9][^ ]*)|${GHCR_REPO}:\1|" docker-compose.yml
          sed -i -E "s|(astros-server[^:]*:)[0-9][^ ]*|\1${VERSION}|" docker-compose.yml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add astros_api/package.json astros_api/package-lock.json \
                  astros_vue/package.json astros_vue/package-lock.json \
                  docker-compose.yml
          git commit -m "chore: bump release version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container
        run: docker compose build

      - name: Push to GHCR
        run: docker compose push
