name: Dev Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Bump Version, Build & Push
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Bump dev version
        id: version
        run: |
          CURRENT=$(jq -r .version astros_api/package.json)
          if [[ "$CURRENT" =~ -dev\.([0-9]+)$ ]]; then
            DEV_NUM="${BASH_REMATCH[1]}"
            BASE="${CURRENT%-dev.*}"
            NEW_VERSION="${BASE}-dev.$((DEV_NUM + 1))"
          else
            NEW_VERSION="${CURRENT}-dev.0"
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW_VERSION"

      - name: Update versions in project files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          GHCR_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/astros-server-dev"
          cd astros_api && npm version "$VERSION" --no-git-tag-version && cd ..
          cd astros_vue && npm version "$VERSION" --no-git-tag-version && cd ..
          sed -i -E "s|ghcr\.io/[^:]+:|${GHCR_REPO}:|g" docker-compose.yml
          sed -i -E "s|(astros-server[^:]*:)[0-9][^ ]*|\1${VERSION}|" docker-compose.yml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add astros_api/package.json astros_api/package-lock.json \
                  astros_vue/package.json astros_vue/package-lock.json \
                  docker-compose.yml
          git commit -m "chore: bump dev version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container
        run: JWT_KEY=${{ secrets.JWT_KEY }} docker compose build

      - name: Push to GHCR
        run: docker compose push
